# Configuración de pre-commit para el proyecto.
# Instalar: pip install pre-commit && pre-commit install
# Los hooks se ejecutan automáticamente en cada git commit.
# Si alguno falla, el commit se rechaza hasta corregir el problema.

repos:
  # --- Formato, validación y documentación de Terraform ---
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.3
    hooks:
      # Verifica que el código está formateado con terraform fmt
      - id: terraform_fmt

      # Valida la sintaxis de los archivos .tf
      - id: terraform_validate
        args:
          - --hook-config=--retry-once-with-cleanup=true

      # Genera/actualiza documentación con terraform-docs
      - id: terraform_docs
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=false

  # --- Análisis de seguridad ---
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.3
    hooks:
      # Trivy reemplaza al antiguo tfsec (Aqua fusionó tfsec dentro de Trivy).
      - id: terraform_trivy
        args:
          - --args=--severity=HIGH,CRITICAL
