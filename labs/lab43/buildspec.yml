version: 0.2

# ------------------------------------------------------------------------------
# Buildspec del Runner de IaC - Lab43
#
# Este buildspec define el motor de validacion del pipeline. Vive en el
# repositorio CodeCommit junto al codigo Terraform y CodeBuild lo lee
# directamente del repo clonado en cada build.
#
# Estrategia de validacion por tipo de herramienta:
#
#   Pasos 1-3 (formato, sintaxis, TFLint) → Fail Fast   [pre_build]
#     on-failure: ABORT detiene el build en el primer error. No tiene sentido
#     analizar la seguridad de un fichero mal formateado o con errores de tipo.
#
#   Pasos 4-5 (trivy + checkov) → Collect and Fail      [post_build]
#     Ambas herramientas SIEMPRE se ejecutan aunque la primera encuentre errores.
#     Cada una genera un informe JUnit que CodeBuild sube a la pestana Reports.
#     Al final, si cualquiera detecto problemas, el build falla con mensaje claro.
#
# Por que los tests de seguridad van en post_build y no en pre_build:
#   CodeBuild solo procesa la seccion 'reports' al finalizar el ciclo de vida
#   completo del build. Con on-failure: ABORT en pre_build o build, las fases
#   posteriores se saltan y el agente cierra el contenedor sin subir los reports.
#   post_build siempre se ejecuta mientras pre_build y build no fallen con ABORT,
#   y con on-failure: CONTINUE el propio post_build puede fallar sin impedir que
#   el agente procese los ficheros JUnit antes de marcar el build como FAILED.
#
# Flujo de fases:
#   install    -> Verificar herramientas disponibles en la imagen custom
#   pre_build  -> 3 pasos de validacion estructural (Fail Fast):
#                 1. Formato         (terraform fmt)
#                 2. Init + Validate (sintaxis y tipos)
#                 3. TFLint          (errores logicos)
#   build      -> Generar tfplan (solo si pre_build paso)
#   post_build -> 2 herramientas de seguridad (Collect and Fail, on-failure: CONTINUE):
#                 4. trivy  → results/trivy-results.xml
#                 5. Checkov → results/results_junitxml.xml
#                 Fallo unificado al final si alguna detecto hallazgos.
# ------------------------------------------------------------------------------

phases:

  # -- Fase install -------------------------------------------------------------
  # Verifica que las herramientas estan disponibles en la imagen custom y
  # registra sus versiones exactas en los logs para trazabilidad.
  # Si la imagen no tiene alguna herramienta, el build falla aqui con un
  # mensaje claro antes de tocar el codigo a validar.
  install:
    on-failure: ABORT
    commands:
      - echo "==================================================================="
      - echo "Runner de IaC - Lab43"
      - echo "Build ID $CODEBUILD_BUILD_ID"
      - echo "==================================================================="
      - echo "--- Verificando herramientas de la imagen custom ---"
      - terraform version
      - tflint --version
      - trivy --version
      - checkov --version
      - echo "--- Informacion del entorno ---"
      - echo "Directorio de trabajo $(pwd)"
      - echo "Contenido del workspace:"
      - ls -la

  # -- Fase pre_build ------------------------------------------------------------
  # Pasos 1-3: Fail Fast. Un error aborta inmediatamente el build.
  #
  # Paso 1 - terraform fmt -check
  #   Verifica el formato del codigo sin modificarlo. Falla si encuentra
  #   diferencias. Coste: ~1 segundo. Primer filtro de calidad.
  #
  # Paso 2 - terraform init + terraform validate
  #   init descarga el proveedor AWS desde el Terraform Registry.
  #   validate comprueba la sintaxis y la coherencia de tipos sin conectarse
  #   a la API de AWS. -backend=false evita necesitar credenciales de backend.
  #
  # Paso 3 - tflint --init + tflint
  #   TFLint descarga el plugin de AWS (reglas especificas del proveedor).
  #   Detecta: tipos de instancia invalidos, argumentos deprecados, referencias
  #   a recursos que no existen, violaciones de convenciones de nomenclatura.
  #   Complementa a terraform validate: validate no conoce las APIs de AWS,
  #   TFLint si.
  pre_build:
    on-failure: ABORT
    commands:
      - echo "==================================================================="
      - echo "FASE PRE_BUILD - Validaciones estructurales (Fail Fast)"
      - echo "==================================================================="

      - echo "--- [1/5] terraform fmt - verificando formato del codigo ---"
      - T0=$(date +%s%3N)
      - terraform fmt -check -recursive -diff
      - echo "[1/5] PASS - El formato del codigo es correcto ($(($(date +%s%3N) - T0))ms)"

      - echo "--- [2/5] terraform init + validate - sintaxis y tipos ---"
      - T0=$(date +%s%3N)
      - terraform init -backend=false -input=false -no-color
      - terraform validate -no-color
      - echo "[2/5] PASS - La sintaxis y los tipos son correctos ($(($(date +%s%3N) - T0))ms)"

      - echo "--- [3/5] tflint - analisis estatico y errores logicos ---"
      - T0=$(date +%s%3N)
      - tflint --init --config .tflint.hcl
      - tflint --recursive --config .tflint.hcl --format compact
      - echo "[3/5] PASS - No se encontraron errores logicos con TFLint ($(($(date +%s%3N) - T0))ms)"

  # -- Fase build ----------------------------------------------------------------
  # Solo se ejecuta si pre_build completo sin errores.
  # Genera el plan de Terraform y lo convierte a texto legible.
  #
  # En un pipeline de produccion real, aqui se usaria el backend remoto:
  #   terraform init -backend-config=... (credenciales de backend desde SSM o IAM)
  #   terraform plan -var-file=env.tfvars -out=tfplan
  #
  # En este laboratorio usamos -backend=false para centrar el foco en la
  # imagen custom y el patron Fail Fast, sin necesitar infraestructura de backend.
  #
  build:
    on-failure: ABORT
    commands:
      - echo "==================================================================="
      - echo "FASE BUILD - Generacion del plan"
      - echo "==================================================================="
      - echo "--- Generando el plan ---"
      - T0=$(date +%s%3N)
      - terraform plan -out=tfplan.bin -input=false -no-color
      - echo "Plan generado ($(($(date +%s%3N) - T0))ms)"
      - echo "--- Convirtiendo el plan a formato legible (tfplan.txt) ---"
      - terraform show -no-color tfplan.bin > tfplan.txt
      - echo "--- Resumen del plan ---"
      - cat tfplan.txt
      - echo "==================================================================="
      - echo "FASE BUILD - COMPLETADA - Plan generado correctamente"
      - echo "El artefacto 'tfplan.bin' se subira a S3 como evidencia del build."
      - echo "==================================================================="

  # -- Fase post_build -----------------------------------------------------------
  # Patron Collect and Fail: ambas herramientas de seguridad SIEMPRE se ejecutan
  # aunque la primera encuentre errores. Cada una genera un informe JUnit que
  # CodeBuild sube a la pestana Reports al finalizar esta fase.
  #
  # on-failure: CONTINUE (no ABORT):
  #   Con ABORT, un exit 1 en esta fase termina el proceso del agente antes de
  #   que procese la seccion 'reports', por lo que los ficheros JUnit nunca se
  #   suben. Con CONTINUE, cuando el exit 1 final se ejecuta la fase completa
  #   su ciclo de vida normalmente — el agente procesa y sube los informes y
  #   despues marca el build como FAILED.
  #
  # post_build siempre se ejecuta aunque build falle (p.ej. si el plan tiene
  # errores de sintaxis en el proveedor). Esto garantiza que los informes de
  # seguridad esten disponibles en todos los builds que superaron pre_build.
  #
  # Paso 4 - trivy (Collect and Fail)
  #   Analiza misconfiguraciones conocidas (buckets publicos, SGs abiertos...).
  #   Se ejecuta siempre: || SECURITY_FAILED=1 evita el abort inmediato.
  #   trivy no soporta multiples formatos en un unico comando: se ejecuta dos
  #   veces, la primera para texto en los logs y la segunda para JUnit al fichero.
  #   --include-non-failures incluye los checks que pasan en el informe JUnit,
  #   no solo los fallidos, para que CodeBuild Reports muestre el cuadro completo.
  #   La plantilla JUnit esta embebida en la imagen en /usr/local/share/trivy-junit.tpl.
  #   Genera results/trivy-results.xml para CodeBuild Reports.
  #
  # Paso 5 - checkov (Collect and Fail)
  #   Analiza politicas de seguridad como codigo (>1000 checks).
  #   Se ejecuta siempre aunque trivy haya fallado.
  #   Genera results/results_junitxml.xml para CodeBuild Reports.
  #
  # Fallo unificado: si SECURITY_FAILED > 0, el build falla con mensaje claro
  #   y con los informes JUnit ya escritos en disco para CodeBuild Reports.
  post_build:
    on-failure: CONTINUE
    commands:
      - echo "==================================================================="
      - echo "FASE POST_BUILD - Validaciones de seguridad (Collect and Fail)"
      - echo "==================================================================="

      # Las variables persisten entre comandos porque bash ejecuta la fase
      # completa como un unico script. || SECURITY_FAILED=1 impide el abort
      # inmediato y registra el fallo para la comprobacion final.
      - SECURITY_FAILED=0
      - mkdir -p results

      - echo "--- [4/5] trivy - misconfiguraciones de seguridad ---"
      - T0=$(date +%s%3N)
      - trivy config --severity MEDIUM,HIGH,CRITICAL --include-non-failures . || SECURITY_FAILED=1
      - trivy config --format template --template "@/usr/local/share/trivy-junit.tpl" --output results/trivy-results.xml --severity MEDIUM,HIGH,CRITICAL --include-non-failures . 2>/dev/null || true
      - echo "[4/5] trivy completado ($(($(date +%s%3N) - T0))ms, resultado pendiente de comprobacion final)"

      - echo "--- [5/5] checkov - politicas de seguridad como codigo ---"
      - T0=$(date +%s%3N)
      - checkov -d . --framework terraform --compact --output cli --output junitxml --output-file-path results/ || SECURITY_FAILED=1
      - echo "[5/5] checkov completado ($(($(date +%s%3N) - T0))ms, resultado pendiente de comprobacion final)"

      # Comprobacion final unificada. Con on-failure: CONTINUE, este exit 1
      # marca el comando como fallado pero la fase completa su ciclo de vida,
      # permitiendo que el agente suba los reports antes de finalizar el build.
      - echo "==================================================================="
      - '[ $SECURITY_FAILED -eq 0 ] && echo "SEGURIDAD OK - Todas las validaciones pasaron" || { echo "ERROR - Hallazgos de seguridad detectados. Revisa la pestana Reports del proyecto."; exit 1; }'
      - echo "==================================================================="

# -- Artefactos ----------------------------------------------------------------
# Los artefactos se almacenan en el bucket S3 configurado en el proyecto
# CodeBuild bajo el prefijo artifacts/<BUILD_ID>/.
#
# tfplan.bin - Plan binario listo para 'terraform apply' (aprobacion manual)
# tfplan.txt - Plan en texto plano para revision humana o auditoria
artifacts:
  files:
    - tfplan.bin
    - tfplan.txt
  name: plan-$CODEBUILD_BUILD_NUMBER
  discard-paths: yes

# -- Informes de test (CodeBuild Reports) --------------------------------------
# CodeBuild recoge los ficheros JUnit de trivy y checkov y los publica en la
# pestana Reports del proyecto al finalizar la fase post_build.
#
# Report groups creados automaticamente en la primera ejecucion:
#   <project-name>-trivy-report   → hallazgos de trivy por severidad
#   <project-name>-checkov-report → checks de Checkov pasados/fallados
reports:
  trivy-report:
    files:
      - "results/trivy-results.xml"
    file-format: JUNITXML
  checkov-report:
    files:
      - "results/results_junitxml.xml"
    file-format: JUNITXML
