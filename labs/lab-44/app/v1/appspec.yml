version: 0.0
os: linux
files:
  - source: index.html
    destination: /var/www/html
  - source: health
    destination: /var/www/html
  - source: image.png
    destination: /var/www/html
permissions:
  - object: scripts
    pattern: "*.sh"
    type:
      - file
    mode: "0755"
hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 30
      runas: root
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 30
      runas: root
  AfterInstall:
    - location: scripts/start_server.sh
      timeout: 60
      runas: root
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 30
      runas: root
