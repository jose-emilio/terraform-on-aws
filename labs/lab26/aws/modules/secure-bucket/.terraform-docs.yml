# Configuracion de terraform-docs para el modulo secure-bucket.
# Genera automaticamente las tablas de variables y outputs dentro del README.md.
#
# Uso:
#   terraform-docs markdown table --config .terraform-docs.yml .
#
# O con el flag de inyeccion:
#   terraform-docs markdown table --output-file README.md --output-mode inject .

formatter: "markdown table"

output:
  file: "README.md"
  mode: "inject"

sort:
  enabled: true
  by: "required"

settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: true
  hide-empty: false
  html: true
  indent: 3
  lockfile: false
  read-comments: true
  required: true
  sensitive: true
  type: true
